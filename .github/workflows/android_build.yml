name: Android APK Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Match the CPython version serious_python downloads (3.12.x)
          python-version: '3.12'

      - name: Install Flet CLI
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build APK with Flet
        run: |
          flet build apk --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ForecastCam-APK
          path: build/apk/*.apk
